<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEKURI - Мини-приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/catalog.css">
    <link rel="stylesheet" href="/static/css/cart.css">
    <link rel="stylesheet" href="/static/css/footer.css">
</head>
<body>
    <!-- Кнопка назад -->
    <button id="back-button" style="display: none;">
        <img src="/static/back.svg" alt="Назад">
    </button>
    
    <!-- Основной контент -->
    <div id="content">
        <div class="menu-vertical">
            <button onclick="showRegions()">Адреса магазинов</button>
            <button onclick="showFeedback()">Оставить отзыв</button>
            <button onclick="showContacts()">Контакты</button>
            <button onclick="showVacancies()">Вакансии</button>
        </div>
        
        <!-- Карусель акций -->
        <div class="promotions-carousel" id="promotions-carousel"></div>
    </div>
    
    <!-- Футер -->
    <nav class="footer-nav">
        <div class="footer-item active" data-section="home" id="home-button">
            <img src="/static/home.svg" alt="Домой">
            <span>Домой</span>
        </div>
        <div class="footer-item" data-section="catalog" id="catalog-button">
            <img src="/static/category.svg" alt="Каталог">
            <span>Каталог</span>
        </div>
        <div class="footer-item" data-section="cart" id="cart-footer-button">
            <img src="/static/add-cart.svg" alt="Корзина">
            <span>Корзина</span>
        </div>
        <div class="footer-item" data-section="promotions" id="promotions-button">
            <img src="/static/discount.svg" alt="Акции">
            <span>Акции</span>
        </div>
        <div class="footer-item" data-section="user" id="login-button">
            <img src="/static/log-in.svg" alt="Кабинет">
            <span>Кабинет</span>
        </div>
    </nav>
    
    <script src="/static/js/navigation.js"></script>
    <script src="/static/js/cart.js"></script>
    <script src="/static/js/catalog.js"></script>
    <script src="/static/js/footer.js"></script>
    <script>
        // Глобальные функции для главной страницы
        window.showHome = function() {
            navigationStack.length = 0;
            window.pushScreen('home', 'home');
            
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="menu-vertical">
                    <button onclick="showRegions()">Адреса магазинов</button>
                    <button onclick="showFeedback()">Оставить отзыв</button>
                    <button onclick="showContacts()">Контакты</button>
                    <button onclick="showVacancies()">Вакансии</button>
                </div>
                <div class="promotions-carousel" id="promotions-carousel"></div>
            `;
            
            loadPromotions();
            window.setActiveFooter('home');
        };
        
        window.showCatalogPage = function() {
            if (window.initCatalogPage) window.initCatalogPage();
        };
        
        window.showUserPage = function() {
            window.currentFooterSection = 'user';
            window.setActiveFooter('user');
            window.location.href = '/user';
        };
        
        window.showPromotions = function() {
            window.currentFooterSection = 'promotions';
            window.setActiveFooter('promotions');
            loadPromotions();
        };
        
        // Функции для кнопок главного меню
        async function showRegions() {
            try {
                const response = await fetch('/api/regions');
                const regions = await response.json();
                
                window.pushScreen('regions', 'home');
                
                const html = `
                    <h3>Выберите регион</h3>
                    <div class="menu-vertical">
                        ${regions.map(r => `<button onclick="showCities('${r}')">${r}</button>`).join('')}
                    </div>
                `;
                setContent(html);
            } catch (error) {
                console.error('Ошибка загрузки регионов:', error);
                showToast('Ошибка загрузки данных');
            }
        }
        
        async function showCities(region) {
            try {
                const response = await fetch(`/api/cities/${region}`);
                const cities = await response.json();
                
                window.pushScreen(`cities-${region}`, 'home');
                
                const html = `
                    <h3>Города в регионе ${region}</h3>
                    <div class="menu-vertical">
                        ${cities.map(c => `<button onclick="showStores('${region}', '${c}')">${c}</button>`).join('')}
                    </div>
                `;
                setContent(html);
            } catch (error) {
                console.error('Ошибка загрузки городов:', error);
                showToast('Ошибка загрузки данных');
            }
        }
        
        async function showStores(region, city) {
            try {
                const response = await fetch(`/api/stores/${region}/${city}`);
                const stores = await response.json();
                
                window.pushScreen(`stores-${city}`, 'home');
                
                const html = `
                    <h3>Магазины в городе ${city}</h3>
                    <div class="menu-vertical">
                        ${stores.map(s => `
                            <div class="promotion-item">
                                <h4>${s.name}</h4>
                                <p>Адрес: ${s.address}</p>
                                <p>Режим работы: ${s.hours}</p>
                                ${s.map_link ? `<a href="${s.map_link}" target="_blank" class="auth-fill-button">Посмотреть на карте</a>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
                setContent(html);
            } catch (error) {
                console.error('Ошибка загрузки магазинов:', error);
                showToast('Ошибка загрузки данных');
            }
        }
        
        function showFeedback() {
            window.pushScreen('feedback', 'home');
            setContent(`
                <h3>Оставить отзыв</h3>
                <p style="text-align: center; padding: 20px;">
                    Для оставления отзыва напишите нам в Telegram:<br>
                    <a href="https://t.me/Shop_NEKURIBY_bot" target="_blank" class="auth-fill-button">@Shop_NEKURIBY_bot</a>
                </p>
            `);
        }
        
        function showContacts() {
            window.pushScreen('contacts', 'home');
            setContent(`
                <h3>Контакты</h3>
                <div class="user-data">
                    <div class="data-row">
                        <span class="data-label">Telegram:</span>
                        <span class="data-value">@Shop_NEKURIBY_bot</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Сайт:</span>
                        <span class="data-value">nekuri.by</span>
                    </div>
                </div>
            `);
        }
        
        function showVacancies() {
            window.pushScreen('vacancies', 'home');
            setContent(`
                <h3>Вакансии</h3>
                <p style="text-align: center; padding: 20px;">
                    Актуальные вакансии уточняйте в Telegram:<br>
                    <a href="https://t.me/Shop_NEKURIBY_bot" target="_blank" class="auth-fill-button">@Shop_NEKURIBY_bot</a>
                </p>
            `);
        }
        
        // Загрузка акций
        async function loadPromotions() {
            try {
                const response = await fetch('/api/promotions');
                const promotions = await response.json();
                
                const carousel = document.getElementById('promotions-carousel');
                if (!carousel || !promotions.length) return;
                
                carousel.innerHTML = `
                    <div class="carousel-container">
                        ${promotions.map(p => `
                            <div class="carousel-slide">
                                <div class="carousel-banner" onclick="window.open('${p.link || '#'}', '_blank')">
                                    <img src="${p.image || ''}" alt="${p.title || ''}">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Ошибка загрузки акций:', error);
            }
        }
        
        function setContent(html) {
            const el = document.getElementById("content");
            if (!el) return;
            
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerHTML = html;
                el.style.opacity = 1;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 100);
        }
        
        function showToast(message, duration = 2000) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 12px 24px; border-radius: 4px; z-index: 1000; opacity: 0; transition: opacity 0.3s;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = 1, 10);
            setTimeout(() => {
                toast.style.opacity = 0;
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
        
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            window.pushScreen('home', 'home');
            loadPromotions();
        });
    </script>
</body>
</html>
