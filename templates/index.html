<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEKURI Shop</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Наши стили -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Шапка приложения -->
    <header class="app-header">
        <div class="logo">NEKURI</div>
    </header>

    <!-- Основной контейнер для экранов (Каталог / Профиль) -->
    <main id="main-content" class="main-content">
        <!-- Сюда JavaScript будет вставлять контент -->
    </main>

    <!-- Выезжающая панель корзины -->
    <div id="cart-panel" class="cart-panel">
        <div class="cart-header">
            <h2>Корзина</h2>
            <button id="close-cart-btn" class="icon-btn">✕</button>
        </div>
        
        <div id="cart-items" class="cart-items">
            <!-- Сюда JS добавит товары -->
            <div class="empty-cart">Корзина пуста</div>
        </div>
        
        <div class="cart-footer">
            <div class="cart-row">
                <span>Скидка 3%:</span>
                <span id="cart-discount">-0.00 BYN</span>
            </div>
            <div class="cart-row">
                <span>Доставка:</span>
                <span id="cart-delivery">4.00 BYN</span>
            </div>
            <div class="cart-row total">
                <span>Итого:</span>
                <span id="cart-total">0.00 BYN</span>
            </div>
            <button id="btn-checkout" class="btn-primary">Оформить заказ</button>
        </div>
    </div>

    <!-- Экран оформления заказа (выезжает справа) -->
    <div id="checkout-screen" class="checkout-screen">
        <div class="checkout-header">
            <button id="btn-back-to-cart" class="icon-btn">←</button>
            <h2>Оформление</h2>
        </div>
        
        <div class="checkout-content">
            <div id="checkout-summary" class="checkout-summary">
                <!-- Краткая сводка заказа -->
            </div>
            
            <form id="checkout-form" class="checkout-form">
                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" id="inp-name" required placeholder="Иванов Иван">
                </div>
                <div class="form-group">
                    <label>Город</label>
                    <input type="text" id="inp-city" required placeholder="Минск">
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <input type="text" id="inp-address" required placeholder="ул. Примерная, 10">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="inp-phone" required placeholder="+375...">
                </div>
                <button type="submit" class="btn-primary">Подтвердить заказ</button>
            </form>
        </div>
    </div>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-screen="catalog">
            <span class="nav-icon">🏪</span>
            <span class="nav-label">Каталог</span>
        </button>
        <button class="nav-item" data-screen="cart">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Корзина</span>
            <span id="cart-badge" class="badge">0</span>
        </button>
        <button class="nav-item" data-screen="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профиль</span>
        </button>
    </nav>

    <!-- Всплывающее уведомление (Toast) -->
    <div id="toast" class="toast"></div>

    <!-- Наш главный скрипт -->
    <script src="/static/js/app.js"></script>
</body>
</html>
